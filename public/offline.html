<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — KyberLife</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center}
    .icon{width:80px;height:80px;margin-bottom:2rem;opacity:.6}
    h1{font-size:1.5rem;font-weight:700;margin-bottom:.75rem}
    p{font-size:.9rem;color:#94a3b8;max-width:28rem;line-height:1.6}
    button{margin-top:2rem;padding:.75rem 2rem;border-radius:.75rem;border:1px solid #334155;background:#1e293b;color:#e2e8f0;font-size:.875rem;font-weight:500;cursor:pointer;transition:background .2s,border-color .2s}
    button:hover{background:#334155;border-color:#475569}
  </style>
</head>
<body>
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="1" y1="1" x2="23" y2="23"/>
    <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
    <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
    <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
    <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
    <line x1="12" y1="20" x2="12.01" y2="20"/>
  </svg>
  <h1>You're offline</h1>
  <p>It looks like you lost your internet connection. Some features may be unavailable until you reconnect.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
